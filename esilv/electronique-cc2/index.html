  <style>
    :root {
      --bg: #070b12;
      --panel: rgba(17,24,39,.78);

      --muted: #9ca3af;

    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }

        radial-gradient(900px 700px at 90% 10%, rgba(244,114,182,.10), transparent 55%),

      line-height: 1.45;
      background-attachment: fixed;
    }
    .container { max-width: 1120px; margin: 0 auto; padding: 22px 16px 72px; }
    .header {
      display: grid; gap: 12px; padding: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); position: sticky; top: 12px; z-index: 10;
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }
    .toprow { display:flex; align-items:flex-start; justify-content:space-between; gap: 14px; flex-wrap: wrap; }
    h1 { font-size: 20px; margin: 0; letter-spacing: .2px; background: linear-gradient(135deg, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .subtitle { color: var(--muted); font-size: 13px; margin: 4px 0 0; }
    .controls { display:flex; gap: 10px; flex-wrap: nowrap; align-items:center; justify-content:flex-end; }
    .search {
      min-width: 240px; flex: 1 1 260px;
      background: rgba(15,23,42,.70); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 12px; color: var(--text); outline: none;
    }
    .search:focus { outline: 2px solid var(--focus); outline-offset: 2px; }
    .chips { display:flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      cursor: pointer; -webkit-user-select: none; user-select: none; padding: 8px 10px; border-radius: 999px;
      border: 1px solid var(--border); background: rgba(15,23,42,.65);
      color: var(--text); font-size: 12px; font-weight: 800;
      transition: border-color .18s ease, transform .08s ease;
    }

    .chip.active { border-color: rgba(167,139,250,.58); background: rgba(167,139,250,.14); }
    button {
      cursor:pointer; border: 1px solid var(--border); background: rgba(15,23,42,.85);
      color: var(--text); padding: 9px 12px; border-radius: 12px; font-weight: 800;
      transition: transform .08s ease, background .18s ease, border-color .18s ease; white-space: nowrap;
    }
    button:hover { transform: translateY(-1px); border-color: rgba(167,139,250,.35); background: rgba(15,23,42,1); }
    button:focus { outline: 2px solid var(--focus); outline-offset: 2px; }
    .danger { border-color: rgba(239,68,68,.35); }
    .danger:hover { border-color: rgba(239,68,68,.6); }
    .ghost { background: rgba(255,255,255,.05); }
    .stats { display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    .pill {
      display:inline-flex; align-items:center; gap:8px;
      padding: 8px 12px; border-radius: 999px;
      border: 1px solid var(--border); background: rgba(17,24,39,.7); font-size: 13px;
    }
    .dot { width:9px; height:9px; border-radius:999px; background: var(--accent); box-shadow:0 0 0 4px rgba(167,139,250,.14); }
    .progress { height: 10px; border-radius: 999px; background: rgba(255,255,255,.06); overflow:hidden; border:1px solid var(--border); }
    .progress > div { height:100%; width:0%; background: linear-gradient(90deg, rgba(167,139,250,.9), rgba(244,114,182,.9)); transition: width .25s ease; }
    .grid { margin-top: 16px; display:grid; grid-template-columns: 1fr; gap: 14px; }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
    }
    .card-back { display: none; }
    .card.flipped .card-front { display: none; }
    .card.flipped .card-back { display: block; }

    .card.flipping { animation: cardFlip .45s ease-in-out; }
    .explain-btn { margin-top: 12px; width: 100%; background: rgba(167,139,250,.08); border-color: rgba(167,139,250,.22); color: rgba(167,139,250,.9); }
    .explain-btn:hover { background: rgba(167,139,250,.15); border-color: rgba(167,139,250,.4); }
    .explain-title { font-weight: 900; font-size: 15px; margin-bottom: 10px; background: linear-gradient(135deg, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .explain-text { font-size: 14px; line-height: 1.7; color: var(--text); }
    .meta { display:flex; justify-content:space-between; gap: 12px; align-items:flex-start; margin-bottom: 12px; }
    .tag {
      font-size: 12px; font-weight: 900; color: rgba(167,139,250,.95);
      background: rgba(167,139,250,.12); padding: 6px 10px;
      border: 1px solid rgba(167,139,250,.20); border-radius: 999px; white-space: nowrap;
    }
    .section {
      font-size: 12px; font-weight: 800; color: rgba(156,163,175,.95);
      background: rgba(255,255,255,.05); padding: 6px 10px;
      border: 1px solid var(--border); border-radius: 999px; white-space: nowrap;
    }
    .qtext { margin: 0; font-size: 15px; }
    .choices { display:grid; gap: 10px; margin-top: 12px; }
    .choice {
      display:grid; grid-template-columns: 44px 1fr; gap: 12px; align-items: start;
      padding: 12px; border-radius: 14px; border: 1px solid var(--border);
      background: rgba(15,23,42,.55);
      transition: border-color .16s ease, background .16s ease, transform .08s ease;
      -webkit-user-select: none;
      user-select: none;
    }
    .choice:hover { border-color: rgba(167,139,250,.35); transform: translateY(-1px); background: rgba(15,23,42,.75); }
    .badge {
      width: 44px; height: 28px; border-radius: 999px;
      display:inline-flex; align-items:center; justify-content:center;
      font-weight: 900; letter-spacing: .6px;
      background: rgba(255,255,255,.06); border: 1px solid var(--border);
    }
    .ctext { font-size: 14px; }
    code {
      background: rgba(255,255,255,.06); border: 1px solid var(--border);
      padding: 2px 6px; border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 13px;
    }
    .locked .choice { cursor: default; }
    .locked .choice:hover { transform:none; }
    .good { border-color: rgba(34,197,94,.55) !important; background: rgba(34,197,94,.12) !important; }
    .good .badge { background: rgba(34,197,94,.15); border-color: rgba(34,197,94,.35); }
    .bad { border-color: rgba(239,68,68,.55) !important; background: rgba(239,68,68,.12) !important; }
    .bad .badge { background: rgba(239,68,68,.15); border-color: rgba(239,68,68,.35); }
    .selected { outline: 2px solid rgba(167,139,250,.35); outline-offset: 2px; }
    .hint { margin-top: 10px; color: var(--muted); font-size: 12px; display: none; }
    .card.revealed .hint { display:block; }
    .fillwrap { margin-top: 12px; display:flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .fillinput {
      flex: 1 1 260px; min-width: 220px; padding: 10px 12px; border-radius: 12px;
      border: 1px solid var(--border); background: rgba(15,23,42,.70); color: var(--text); outline: none;
    }
    .fillinput:focus { outline: 2px solid var(--focus); outline-offset: 2px; }
    .fillinput.goodin { border-color: rgba(34,197,94,.55); }
    .fillinput.badin { border-color: rgba(239,68,68,.55); }
    .smallnote { color: var(--muted); font-size: 12px; margin-top: 10px; }
    .footer { margin-top: 16px; color: var(--muted); font-size: 12px; text-align:center; }
    .toggle-header { display: none; }
    @media (min-width: 950px) { .grid { grid-template-columns: 1fr 1fr; } }
    @media (min-width: 1320px) { .grid { grid-template-columns: 1fr 1fr 1fr; } }
    @media (max-width: 520px) {
      .container { padding: 16px 12px 56px; }
      .header { padding: 12px; top: 8px; gap: 10px; transition: transform .3s ease, opacity .3s ease; }
      .header.collapsed { transform: translateY(-110%); opacity: 0; pointer-events: none; position: sticky; }
      h1 { font-size: 16px; }
      .subtitle { font-size: 12px; }
      .chips { display: none; }
      .controls { gap: 8px; flex-wrap: wrap; }
      .search { min-width: 0; flex: 1 1 160px; padding: 9px 10px; }
      button { padding: 8px 10px; border-radius: 10px; font-size: 13px; }
      .pill { padding: 6px 8px; font-size: 11px; }
      .pill .lbl { display: none; }
      .progress { height: 8px; }
      .card { padding: 14px; border-radius: 16px; }
      .qtext { font-size: 14px; }
      .choice { grid-template-columns: 40px 1fr; }
      .badge { width: 40px; }
      .toggle-header {
        display: flex; align-items: center; justify-content: center;
        position: fixed; top: 14px; right: 14px; z-index: 30;
        width: 36px; height: 36px; border-radius: 999px;
        background: rgba(17,24,39,.45); border: 1px solid rgba(255,255,255,.18);
        box-shadow: 0 2px 12px rgba(0,0,0,.5);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        color: #fff; font-size: 18px; cursor: pointer; line-height: 1;
        transition: transform .15s ease, background .18s ease;
      }
      .toggle-header:active { transform: scale(0.9); }
    }
  </style>

<script>
const DATA = {"questions":[
{"id":"1","label":"Q1","section":"Transistor Bipolaire","type":"single","text":"Un transistor bipolaire NPN est constitué de :","choices":["Deux zones P séparées par une zone N","Deux zones N séparées par une zone P","Trois zones N","Une zone P et une zone N"],"answer":1},
{"id":"2","label":"Q2","section":"Transistor Bipolaire","type":"single","text":"Les trois électrodes d'un transistor bipolaire sont :","choices":["Grille, Drain, Source","Base, Émetteur, Collecteur","Anode, Cathode, Gate","Entrée, Sortie, Masse"],"answer":1},
{"id":"3","label":"Q3","section":"Transistor Bipolaire","type":"single","text":"Dans un transistor NPN passant, la tension V<sub>BE</sub> est approximée à :","choices":["0 V","0,3 V","0,6 V","1,2 V"],"answer":2},
{"id":"4","label":"Q4","section":"Transistor Bipolaire","type":"single","text":"Le gain en courant β d'un transistor bipolaire relie :","choices":["I<sub>C</sub> et I<sub>E</sub> : β = I<sub>C</sub> / I<sub>E</sub>","I<sub>C</sub> et I<sub>B</sub> : β = I<sub>C</sub> / I<sub>B</sub>","I<sub>B</sub> et I<sub>E</sub> : β = I<sub>B</sub> / I<sub>E</sub>","V<sub>CE</sub> et V<sub>BE</sub> : β = V<sub>CE</sub> / V<sub>BE</sub>"],"answer":1},
{"id":"5","label":"Q5","section":"Transistor Bipolaire","type":"single","text":"La relation entre les courants d'un transistor bipolaire est :","choices":["I<sub>E</sub> = I<sub>C</sub> − I<sub>B</sub>","I<sub>E</sub> = I<sub>C</sub> + I<sub>B</sub>","I<sub>B</sub> = I<sub>C</sub> + I<sub>E</sub>","I<sub>C</sub> = I<sub>E</sub> + I<sub>B</sub>"],"answer":1},
{"id":"6","label":"Q6","section":"Transistor Bipolaire","type":"single","text":"Quand un transistor bipolaire est en régime saturé :","choices":["V<sub>CE</sub> est très grande (proche de V<sub>CC</sub>)","V<sub>CE</sub> est très faible (V<sub>CE,sat</sub> ≈ 0.2 V)","I<sub>C</sub> = 0","Le transistor est bloqué"],"answer":1},
{"id":"7","label":"Q7","section":"Transistor Bipolaire","type":"single","text":"La polarisation par pont de base est préférée car :","choices":["Elle simplifie le circuit","Elle rend le point de fonctionnement indépendant de β","Elle augmente le gain","Elle supprime la résistance d'émetteur"],"answer":1},
{"id":"8","label":"Q8","section":"Transistor Bipolaire","type":"single","text":"Dans le modèle dynamique (petits signaux) du transistor bipolaire, le paramètre h<sub>21</sub> représente :","choices":["La résistance d'entrée dynamique","Le gain en courant ≈ β","L'admittance de sortie","La réaction inverse"],"answer":1},
{"id":"9","label":"Q9","section":"Transistor Bipolaire","type":"single","text":"Le paramètre h<sub>11</sub> d'un transistor bipolaire est :","choices":["Le gain en courant","La résistance dynamique d'entrée (quelques kΩ)","La conductance de sortie","La tension d'Early"],"answer":1},
{"id":"10","label":"Q10","section":"Transistor Bipolaire","type":"single","text":"La transconductance g<sub>m</sub> d'un transistor bipolaire vaut :","choices":["g<sub>m</sub> = I<sub>C</sub> / 0.026 (à 27°C)","g<sub>m</sub> = β / I<sub>C</sub>","g<sub>m</sub> = V<sub>BE</sub> / I<sub>B</sub>","g<sub>m</sub> = I<sub>B</sub> / V<sub>CE</sub>"],"answer":0},
{"id":"11","label":"Q11","section":"Transistor Bipolaire","type":"single","text":"L'effet Early dans un transistor bipolaire se manifeste par :","choices":["Un gain en courant β infini","Une augmentation de I<sub>C</sub> avec V<sub>CE</sub> en zone active","Une saturation immédiate","Un blocage du transistor"],"answer":1},
{"id":"12","label":"Q12","section":"Transistor Bipolaire","type":"single","text":"Dans un montage émetteur commun (EC) avec découplage, le gain en tension est :","choices":["A<sub>v</sub> = −g<sub>m</sub> · R<sub>C</sub>","A<sub>v</sub> = 1 + R<sub>2</sub>/R<sub>1</sub>","A<sub>v</sub> = −R<sub>1</sub>/R<sub>2</sub>","A<sub>v</sub> = β"],"answer":0},
{"id":"13","label":"Q13","section":"Transistor Bipolaire","type":"single","text":"Le principe du miroir de courant nécessite :","choices":["Deux transistors identiques sur le même substrat","Deux résistances égales","Un seul transistor et un AOP","Un pont de Wheatstone"],"answer":0},
{"id":"14","label":"Q14","section":"Transistor Bipolaire","type":"fill","text":"Avec V<sub>CC</sub> = 10 V, R<sub>B</sub> = 44 kΩ, V<sub>BB</sub> = 5 V, V<sub>BE</sub> = 0.6 V et β = 100, calculer I<sub>B</sub> en µA.","placeholder":"Réponse en µA (ex: 100)","answer_text":"100","answers":["100","100µA","0.1mA"]},
{"id":"15","label":"Q15","section":"Transistor Bipolaire","type":"fill","text":"Avec les données de la question précédente (I<sub>B</sub> = 100 µA, β = 100), calculer I<sub>C</sub> en mA.","placeholder":"Réponse en mA","answer_text":"10","answers":["10","10mA"]},
{"id":"16","label":"Q16","section":"Transistor Bipolaire","type":"fill","text":"Toujours avec V<sub>CC</sub> = 10 V, R<sub>C</sub> = 500 Ω, I<sub>C</sub> = 10 mA. Calculer V<sub>CE</sub> en V.","placeholder":"Réponse en V","answer_text":"5","answers":["5","5V","5.0"]},
{"id":"17","label":"Q17","section":"Transistor Bipolaire","type":"single","text":"Un transistor bipolaire est un composant :","choices":["Unipolaire (un seul type de porteur)","Bipolaire (deux types de porteurs : électrons et trous)","Tripolaire","Quadripolaire"],"answer":1},
{"id":"18","label":"Q18","section":"Transistor Bipolaire","type":"single","text":"La polarisation par résistance de base seule est instable car :","choices":["La tension V<sub>CC</sub> varie","Le point de fonctionnement dépend fortement de β qui varie d'un transistor à l'autre et avec la température","La résistance de base est trop petite","V<sub>BE</sub> n'est jamais constant"],"answer":1},
{"id":"19","label":"Q19","section":"FET / MOSFET","type":"single","text":"FET signifie :","choices":["Fast Electronic Transistor","Field Effect Transistor","Frequency Enhanced Transistor","Forward Emitter Transistor"],"answer":1},
{"id":"20","label":"Q20","section":"FET / MOSFET","type":"single","text":"Les trois électrodes d'un FET sont :","choices":["Base, Émetteur, Collecteur","Grille (Gate), Drain, Source","Anode, Cathode, Grille","Entrée, Sortie, Contrôle"],"answer":1},
{"id":"21","label":"Q21","section":"FET / MOSFET","type":"single","text":"Le FET est un composant :","choices":["Bipolaire (deux types de porteurs)","Unipolaire (un seul type de porteur)","Sans porteurs de charge","Tripolaire"],"answer":1},
{"id":"22","label":"Q22","section":"FET / MOSFET","type":"single","text":"Par rapport au transistor bipolaire, le FET est piloté :","choices":["En courant (courant de grille important)","En tension (courant de grille nul, i<sub>G</sub> = 0)","En puissance","En fréquence"],"answer":1},
{"id":"23","label":"Q23","section":"FET / MOSFET","type":"single","text":"MOSFET signifie :","choices":["Metal Oxide Semiconductor Field Effect Transistor","Multiple Output Source Emitter Feedback Transistor","Magnetic Oscillation Semiconductor FET","Modulated Optical Signal FET"],"answer":0},

{"id":"25","label":"Q25","section":"FET / MOSFET","type":"single","text":"Dans un MOSFET à enrichissement (enhanced) NMOS, le transistor commence à conduire quand :","choices":["V<sub>GS</sub> < 0","V<sub>GS</sub> > V<sub>GS(th)</sub> (tension de seuil)","V<sub>DS</sub> = 0","V<sub>GS</sub> = 0"],"answer":1},
{"id":"26","label":"Q26","section":"FET / MOSFET","type":"single","text":"La relation de courant d'un JFET en zone de pincement est :","choices":["I<sub>D</sub> = I<sub>DSS</sub> · (1 + V<sub>GS</sub>/V<sub>P</sub>)²","I<sub>D</sub> = β · I<sub>B</sub>","I<sub>D</sub> = V<sub>DS</sub> / R<sub>DS</sub>","I<sub>D</sub> = g<sub>m</sub> · V<sub>DS</sub>"],"answer":0},

{"id":"28","label":"Q28","section":"FET / MOSFET","type":"single","text":"La tension V<sub>P</sub> (tension de pincement) d'un JFET type N :","choices":["Est toujours positive","Est négative : le canal se ferme quand V<sub>GS</sub> = V<sub>P</sub>","Est nulle","Dépend de V<sub>DS</sub> uniquement"],"answer":1},
{"id":"29","label":"Q29","section":"FET / MOSFET","type":"single","text":"Le CMOS (Complementary MOS) associe :","choices":["Deux transistors NMOS","Un NMOS et un PMOS","Deux transistors bipolaires","Un JFET et un MOSFET"],"answer":1},
{"id":"30","label":"Q30","section":"FET / MOSFET","type":"single","text":"Un avantage majeur du CMOS dans les circuits numériques est :","choices":["Pas de consommation statique (consomme uniquement lors des commutations)","Un gain en courant très élevé","Une tension de seuil nulle","Un courant de fuite important"],"answer":0},

const EXPL={"1":"Un NPN = deux zones N (Émetteur et Collecteur) séparées par une zone P (Base). C'est la structure de base du transistor bipolaire NPN.","2":"Les trois électrodes d'un BJT sont la Base (commande), l'Émetteur (sortie des porteurs majoritaires) et le Collecteur (collecte les porteurs). Ne pas confondre avec les électrodes du FET.","3":"Pour un transistor silicium en fonctionnement normal, la jonction B-E est polarisée en direct. La chute de tension typique d'une jonction silicium est ≈ 0.6 V (0.3 V pour le germanium).","4":"β = I_C / I_B est le gain en courant statique. Il relie le courant de collecteur au courant de base. Typiquement β ∈ [50, 300]. Plus β est grand, plus le transistor amplifie.","5":"Par la loi des nœuds (Kirchhoff), le courant entrant par l'émetteur est la somme des courants entrant par la base et le collecteur : I_E = I_C + I_B.","6":"En saturation, les deux jonctions (B-E et B-C) sont polarisées en direct. V_CE chute à une valeur très faible (≈ 0.2 V). Le transistor se comporte comme un interrupteur fermé.","7":"Le pont de base fixe V_B par un diviseur résistif indépendant de β. Grâce à R_E qui stabilise par contre-réaction, le point de repos est quasi-indépendant des dispersions de β.","8":"h₂₁ = ΔI_C/ΔI_B à V_CE constant. C'est le gain en courant dynamique (petits signaux), approximativement égal à β. Il fait partie de la matrice hybride [h].","9":"h₁₁ = ΔV_BE/ΔI_B à V_CE constant. C'est la résistance d'entrée dynamique du transistor, typiquement quelques kΩ. Elle varie avec le point de polarisation.","10":"g_m = I_C / V_T où V_T = kT/q ≈ 26 mV à 27°C. Donc g_m = I_C / 0.026. Plus I_C est grand, plus la transconductance est élevée.","11":"L'effet Early : en zone active, I_C augmente légèrement quand V_CE augmente car la largeur effective de la base diminue (modulation de la largeur de base). On le modélise avec la tension d'Early V_A.","12":"En montage EC avec condensateur de découplage sur R_E, le gain AC est A_v = −g_m·R_C. Le signe − indique une inversion de phase. Sans découplage : A_v = −g_m·R_C/(1+g_m·R_E).","13":"Le miroir de courant utilise deux transistors identiques (même V_BE) sur le même substrat. Le courant de référence fixé par une résistance est recopié dans le second transistor.","14":"I_B = (V_BB − V_BE) / R_B = (5 − 0.6) / 44000 = 4.4/44000 = 100 µA. On applique simplement la loi d'Ohm sur la maille de base.","15":"I_C = β × I_B = 100 × 100 µA = 10 mA. Le courant de collecteur est proportionnel au courant de base via le gain β.","16":"V_CE = V_CC − R_C × I_C = 10 − 500 × 0.01 = 10 − 5 = 5 V. Loi des mailles sur le circuit collecteur-émetteur.","17":"'Bipolaire' signifie que le fonctionnement repose sur deux types de porteurs de charge : les électrons (zones N) ET les trous (zones P). Contrairement au FET qui est unipolaire.","18":"Avec polarisation par R_B seule : I_C = β·(V_CC−V_BE)/R_B. Comme β varie fortement d'un transistor à l'autre et avec la température, le point de repos est instable.","19":"FET = Field Effect Transistor. Le courant est contrôlé par un champ électrique appliqué sur la grille, d'où 'effet de champ'.","20":"Gate (Grille) = électrode de commande, Drain = sortie du courant, Source = entrée du courant. Analogie BJT : Gate↔Base, Drain↔Collecteur, Source↔Émetteur.","21":"Le FET est unipolaire : seul un type de porteur participe à la conduction (électrons pour canal N, trous pour canal P). Contrairement au BJT qui utilise les deux.","22":"Le FET est commandé en tension : i_G = 0 (impédance d'entrée quasi-infinie). Le BJT est commandé en courant (i_B ≠ 0). C'est un avantage majeur du FET.","23":"MOSFET = Metal Oxide Semiconductor FET. L'oxyde (SiO₂) isole la grille du canal, créant une capacité MOS. C'est la technologie dominante des circuits intégrés modernes.","24":"Un MOSFET à enrichissement n'a pas de canal au repos. Il faut appliquer V_GS > V_GS(th) pour créer une couche d'inversion et permettre la conduction.","25":"Pour un NMOS enhanced, le canal N se forme quand V_GS dépasse la tension de seuil V_GS(th). En dessous de ce seuil, le transistor est bloqué.","26":"Équation de Shockley : I_D = I_DSS·(1 + V_GS/V_P)² en zone de pincement. C'est une relation parabolique entre I_D et V_GS.","27":"I_DSS = courant Drain-Source à Saturation quand V_GS = 0. C'est le courant maximal pour un JFET, obtenu quand la grille n'applique aucune tension.","28":"Pour un JFET N, V_P < 0. Quand V_GS diminue vers V_P, le canal se rétrécit jusqu'à se fermer complètement (pincement). I_D = 0 quand V_GS = V_P.","29":"Le CMOS associe un NMOS et un PMOS en complémentaire. Quand l'un conduit, l'autre est bloqué. C'est la base de toute la logique numérique moderne.","30":"En CMOS, un des deux transistors est toujours OFF → aucun chemin de courant statique entre V_DD et masse. La consommation n'a lieu que lors des transitions (charge/décharge des capacités).","31":"Le montage source commune est l'équivalent FET de l'émetteur commun. Le gain est A_v = −g_m·R_D, avec inversion de phase (signe −).","32":"g_m = −2·I_DSS/V_P · (1 + V_GS/V_P) = dérivée de I_D par rapport à V_GS. La transconductance augmente quand V_GS se rapproche de 0 (I_D proche de I_DSS).","33":"L'oxyde de grille très fin des FET les rend vulnérables aux décharges électrostatiques (ESD) qui peuvent percer l'isolant. Des protections ESD sont toujours intégrées.","34":"R_DS(on) augmente avec la température car la mobilité des porteurs diminue quand T augmente. Cela crée un auto-équilibrage thermique (avantage pour la mise en parallèle).","35":"V_GS(th) diminue avec la température (~−2 mV/°C) à cause de l'augmentation de la concentration intrinsèque des porteurs. Le transistor conduit 'plus facilement' à chaud.","36":"En zone de pincement, I_D est quasi-constant sur une large plage de V_DS (caractéristique plate). Le JFET se comporte comme une source de courant I ≈ I_DSS·(1+V_GS/V_P)².","37":"AOP = Amplificateur OPérationnel. C'est un amplificateur différentiel à très fort gain, composant de base de l'électronique analogique.","38":"L'AOP idéal : gain différentiel A → ∞, impédance d'entrée Z_e → ∞ (i⁺ = i⁻ = 0), impédance de sortie Z_s = 0. Ces hypothèses simplifient considérablement les calculs.","39":"En régime linéaire (contre-réaction sur e⁻), le gain infini impose ε = V⁺ − V⁻ → 0. C'est le principe de 'court-circuit virtuel' entre les entrées.","40":"Sans rétroaction ou avec rétroaction positive (sur e⁺), l'AOP fonctionne en comparateur : V_S = +V_CC si ε > 0, V_S = −V_CC si ε < 0. La sortie sature.","41":"Non-inverseur : V⁺ = V_E et V⁻ = V_S·R₁/(R₁+R₂). Avec ε = 0 : V_E = V_S·R₁/(R₁+R₂), donc H₀ = V_S/V_E = 1 + R₂/R₁. Le gain est toujours ≥ 1.","42":"Inverseur : e⁺ = 0 (masse), e⁻ = masse virtuelle. Par le nœud en e⁻ : V_E/R₁ + V_S/R₂ = 0, donc H₀ = −R₂/R₁. Le signe − indique l'inversion de phase.","43":"Suiveur : la sortie est directement rebouclée sur e⁻. Avec ε = 0 : V_S = V⁺ = V_E, donc H₀ = 1. Le signal est transmis sans amplification.","44":"Le suiveur a Z_E = ∞ et Z_S = 0 (idéalement). Il sert de tampon (buffer) pour adapter l'impédance entre un étage haute impédance et une charge basse impédance.","45":"Dans le montage inverseur, e⁻ est à la masse virtuelle (0 V). Le courant d'entrée i = V_E/R₁ traverse R₁. L'impédance d'entrée vue par la source est donc R₁.","46":"Comme ε = 0 et e⁺ est reliée à la masse, e⁻ est aussi à 0 V. Ce n'est PAS un vrai court-circuit avec la masse (aucun courant ne circule vers la masse par e⁻), d'où le terme 'virtuelle'.","47":"Additionneur inverseur : par superposition, V_S = −(R₃/R₁·V₁ + R₃/R₂·V₂). Avec toutes les résistances égales : V_S = −(V₁ + V₂).","48":"Le soustracteur (différentiel) : la condition R₁·R₄ = R₂·R₃ assure le rejet du mode commun. Le gain différentiel est R₄/R₃ = R₂/R₁.","49":"Intégrateur : Z₂ = 1/(Cjω) en feedback. H(jω) = −Z₂/R₁ = −1/(R₁Cjω). Le gain diminue avec la fréquence (−20 dB/déc). La sortie est l'intégrale temporelle de l'entrée.","50":"Dérivateur : Z₁ = 1/(Cjω) en entrée. H(jω) = −R₂/Z₁ = −R₂Cjω. Le gain augmente avec la fréquence (+20 dB/déc). La sortie est la dérivée temporelle de l'entrée.","51":"Le trigger de Schmitt utilise une rétroaction positive (sur e⁺) qui crée deux seuils de basculement distincts. L'hystérésis évite les oscillations parasites autour du seuil de commutation.","52":"GBW = Gain × Bande passante = constante. Si on augmente le gain en boucle fermée H₀, la bande passante f_C' diminue : H₀·f_C' = A₀·f_C = GBW.","53":"Le slew rate (SR) en V/µs limite la vitesse de variation de V_S. Pour un signal sinusoïdal : SR ≥ 2π·f·V_max. Au-delà, la sortie est déformée (triangularisée).","54":"L'AOP nécessite +V_CC et −V_CC (alimentation symétrique) pour pouvoir fournir des tensions de sortie positives ET négatives. Typiquement ±12 V ou ±15 V.","55":"La diode ne laisse passer le courant que dans un sens. Pendant l'alternance positive, elle conduit ; pendant l'alternance négative, elle bloque → redressement simple alternance.","56":"Le condensateur en parallèle se charge pendant la conduction de la diode et se décharge lentement dans la charge entre les pics. Cela lisse les ondulations du signal redressé.","57":"Contre-réaction sur e⁻ = mode linéaire (ε ≈ 0, gain fini en boucle fermée). Sans rétroaction ou rétroaction sur e⁺ = mode comparateur (sortie saturée à ±V_CC).","58":"H₀ = −R₂/R₁ = −30k/10k = −3. Le gain de l'inverseur est le rapport des résistances avec un signe négatif.","59":"H₀ = 1 + R₂/R₁ = 1 + 20k/10k = 1 + 2 = 3. Le gain du non-inverseur est toujours ≥ 1.","60":"Inverseur avec R₁ = 2R₂ : H₀ = −R₂/R₁ = −R₂/(2R₂) = −1/2. Donc V_S1 = −V₁/2. Attention à ne pas confondre R₁ et R₂ dans la formule.","61":"Quand ω → 0, le numérateur jω/ω₀ → 0 donc |H| → 0. En dB : 20·log(0) = −∞. Le filtre coupe les basses fréquences (passe-haut).","62":"Quand ω → ∞, H → −A·(jω/ω₀)/(jω/ω₀) = −A. En dB : 20·log(A). Le gain se stabilise à la valeur A aux hautes fréquences.","63":"En série, les impédances s'ajoutent : Z = Z_R + Z_C = R + 1/(Cjω). Rappel : Z_R = R, Z_C = 1/(Cjω), Z_L = Ljω.","64":"V⁺ dépend de V_e1 via un diviseur, V⁻ dépend de V_S via un autre diviseur. Cette structure réalise un amplificateur différentiel (soustracteur) : V_S ∝ (V₁ − V₂).","65":"A_v = −g_m·R_D = −0.85×10⁻³ × 10×10³ = −8.5. Le signe − indique l'inversion de phase typique du montage source commune."};

(function() {
  const elQuiz = document.getElementById('quiz');
  const elAnswered = document.getElementById('answered');
  const elScore = document.getElementById('score');
  const elWrong = document.getElementById('wrong');
  const elTotal = document.getElementById('total');
  const elBar = document.getElementById('bar');
  const btnReset = document.getElementById('btnReset');
  const btnRevealAll = document.getElementById('btnRevealAll');
  const elSearch = document.getElementById('search');
  const elChips = document.getElementById('chips');

  const KEY = "electronique_cc2_qcm_v1";
  let state = loadState();
  let activeSection = "Toutes";
  let query = "";

  const sections = ["Toutes", ...Array.from(new Set(DATA.questions.map(q => q.section)))];
  elTotal.textContent = DATA.questions.length;

  function loadState() {
    try { const r = localStorage.getItem(KEY); if(!r) return {}; const o = JSON.parse(r); return o && typeof o === 'object' ? o : {}; } catch(e) { return {}; }
  }
  function saveState() { localStorage.setItem(KEY, JSON.stringify(state)); }
  function letter(idx) { return ["A","B","C","D","E","F"][idx] || String(idx+1); }
  function normalizeFill(s) { return s == null ? "" : String(s).trim().replace(/\s+/g, " "); }

  function buildChips() {
    elChips.innerHTML = "";
    sections.forEach(sec => {
      const c = document.createElement('div');
      c.className = "chip" + (sec === activeSection ? " active" : "");
      c.textContent = sec;
      c.addEventListener('click', () => { activeSection = sec; buildChips(); render(); window.scrollTo({top:0, behavior:"smooth"}); });
      elChips.appendChild(c);
    });
  }

  function passesFilter(q) {
    const secOK = (activeSection === "Toutes") || (q.section === activeSection);
    if(!secOK) return false;
    if(!query) return true;
    const hay = (q.label + " " + q.section + " " + stripHtml(q.text) + " " + (q.choices ? q.choices.map(stripHtml).join(" ") : "")).toLowerCase();
    return hay.includes(query.toLowerCase());
  }

  function stripHtml(s) { const d = document.createElement('div'); d.innerHTML = s || ""; return d.textContent || d.innerText || ""; }

  function render() {
    elQuiz.innerHTML = "";
    const visible = DATA.questions.filter(passesFilter);
    visible.forEach(q => {
      const card = document.createElement('div');
      card.className = "card"; card.dataset.qid = q.id;
      const meta = document.createElement('div'); meta.className = "meta";
      const left = document.createElement('div'); left.style.display = "flex"; left.style.gap = "8px"; left.style.flexWrap = "wrap";
      const tag = document.createElement('div'); tag.className = "tag"; tag.textContent = q.label;
      const sec = document.createElement('div'); sec.className = "section"; sec.textContent = q.section;
      left.appendChild(tag); left.appendChild(sec); meta.appendChild(left);
      const p = document.createElement('p'); p.className = "qtext"; p.innerHTML = q.text;
      card.appendChild(meta); card.appendChild(p);

      if(q.type === "single") {
        const choices = renderChoicesSingle(q, card); card.appendChild(choices);
        const hint = document.createElement('div'); hint.className = "hint"; hint.innerHTML = `Bonne réponse : <strong>${letter(q.answer)}</strong>`; card.appendChild(hint);
        if(state[q.id] && state[q.id].locked) applyStateSingle(q, card, choices, state[q.id]);
      }
      if(q.type === "multi") {
        const block = renderChoicesMulti(q, card); card.appendChild(block.wrap);
        const hint = document.createElement('div'); hint.className = "hint"; hint.innerHTML = `Bonnes réponses : <strong>${q.answer_multi.map(letter).join(", ")}</strong>`; card.appendChild(hint);
        if(state[q.id] && state[q.id].locked) applyStateMulti(q, card, block, state[q.id]);
      }
      if(q.type === "fill") {
        const wrap = document.createElement('div'); wrap.className = "fillwrap";
        const input = document.createElement('input'); input.className = "fillinput"; input.placeholder = q.placeholder || "Réponse…"; input.autocomplete = "off"; input.spellcheck = false;
        const btn = document.createElement('button'); btn.textContent = "Vérifier";
        const hint = document.createElement('div'); hint.className = "hint"; hint.innerHTML = `Réponse attendue : <strong>${q.answer_text}</strong>`;
        btn.addEventListener('click', () => onCheckFill(q, card, input, hint));
        input.addEventListener('keydown', ev => { if(ev.key === "Enter") onCheckFill(q, card, input, hint); });
        wrap.appendChild(input); wrap.appendChild(btn); card.appendChild(wrap); card.appendChild(hint);
        const note = document.createElement('div'); note.className = "smallnote"; note.textContent = "Astuce : on ignore les espaces en trop."; card.appendChild(note);
        if(state[q.id] && state[q.id].locked) applyStateFill(q, card, input, hint, state[q.id]);
      }
      // Wrap in card-front / card-back for flip
      const cardFront = document.createElement('div'); cardFront.className = 'card-front';
      while(card.firstChild) cardFront.appendChild(card.firstChild);
      const explBtn = document.createElement('button'); explBtn.className = 'explain-btn ghost'; explBtn.textContent = '💡 Expliquer';
      explBtn.addEventListener('click', () => flipCard(card));
      cardFront.appendChild(explBtn);
      const cardBack = document.createElement('div'); cardBack.className = 'card-back';
      const et = document.createElement('div'); et.className = 'explain-title'; et.textContent = q.label + ' — Explication';
      const ex = document.createElement('div'); ex.className = 'explain-text'; ex.innerHTML = EXPL[q.id] || '';
      const rb = document.createElement('button'); rb.className = 'explain-btn ghost'; rb.textContent = '↩ Retour à la question';
      rb.addEventListener('click', () => flipCard(card));
      cardBack.appendChild(et); cardBack.appendChild(ex); cardBack.appendChild(rb);
      card.appendChild(cardFront); card.appendChild(cardBack);
      elQuiz.appendChild(card);
    });
    updateStats();
  }

  function renderChoicesSingle(q, card) {
    const choices = document.createElement('div'); choices.className = "choices";
    q.choices.forEach((ct, idx) => {
      const row = document.createElement('div'); row.className = "choice"; row.tabIndex = 0;
      const badge = document.createElement('div'); badge.className = "badge"; badge.textContent = letter(idx);
      const c = document.createElement('div'); c.className = "ctext"; c.innerHTML = ct;
      row.appendChild(badge); row.appendChild(c);
      row.addEventListener('click', () => onPickSingle(q, idx, card, choices));
      row.addEventListener('keydown', ev => { if(ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); onPickSingle(q, idx, card, choices); } });
      choices.appendChild(row);
    });
    return choices;
  }

  function onPickSingle(q, idx, card, choices) {
    if(state[q.id] && state[q.id].locked) return;
    const rows = Array.from(choices.querySelectorAll('.choice'));
    card.classList.add('locked','revealed');
    rows[q.answer].classList.add('good');
    const correct = (idx === q.answer);
    if(!correct) rows[idx].classList.add('bad');
    state[q.id] = { type:"single", selected:idx, locked:true, correct };
    saveState(); updateStats();
  }

  function applyStateSingle(q, card, choices, s) {
    const rows = Array.from(choices.querySelectorAll('.choice'));
    card.classList.add('locked','revealed');
    rows[q.answer].classList.add('good');
    if(typeof s.selected === 'number' && s.selected !== q.answer) rows[s.selected].classList.add('bad');
  }

  function renderChoicesMulti(q, card) {
    const wrap = document.createElement('div');
    const choices = document.createElement('div'); choices.className = "choices";
    const picked = new Set();
    q.choices.forEach((ct, idx) => {
      const row = document.createElement('div'); row.className = "choice"; row.tabIndex = 0;
      const badge = document.createElement('div'); badge.className = "badge"; badge.textContent = letter(idx);
      const c = document.createElement('div'); c.className = "ctext"; c.innerHTML = ct;
      row.appendChild(badge); row.appendChild(c);
      row.addEventListener('click', () => {
        if(state[q.id] && state[q.id].locked) return;
        if(picked.has(idx)) { picked.delete(idx); row.classList.remove('selected'); } else { picked.add(idx); row.classList.add('selected'); }
      });
      choices.appendChild(row);
    });
    const actions = document.createElement('div'); actions.style.cssText = "margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;";
    const btnV = document.createElement('button'); btnV.textContent = "Valider"; btnV.className = "ghost";
    btnV.addEventListener('click', () => {
      if(state[q.id] && state[q.id].locked) return;
      card.classList.add('locked','revealed');
      const rows = Array.from(choices.querySelectorAll('.choice'));
      const selected = Array.from(picked).sort((a,b)=>a-b);
      const correctSet = q.answer_multi.slice().sort((a,b)=>a-b);
      const correct = JSON.stringify(selected) === JSON.stringify(correctSet);
      rows.forEach((row,i) => { if(q.answer_multi.includes(i)) row.classList.add('good'); if(selected.includes(i) && !q.answer_multi.includes(i)) row.classList.add('bad'); });
      state[q.id] = { type:"multi", selected, locked:true, correct }; saveState(); updateStats();
    });
    actions.appendChild(btnV); wrap.appendChild(choices); wrap.appendChild(actions);
    return { wrap, choices };
  }

  function applyStateMulti(q, card, block, s) {
    card.classList.add('locked','revealed');
    const rows = Array.from(block.choices.querySelectorAll('.choice'));
    const selected = Array.isArray(s.selected) ? s.selected : [];
    rows.forEach((row,i) => { if(selected.includes(i)) row.classList.add('selected'); if(q.answer_multi.includes(i)) row.classList.add('good'); if(selected.includes(i) && !q.answer_multi.includes(i)) row.classList.add('bad'); });
  }

  function onCheckFill(q, card, input, hint) {
    if(state[q.id] && state[q.id].locked) return;
    const user = normalizeFill(input.value);
    const accept = (q.answers || []).map(normalizeFill);
    const correct = accept.includes(user);
    card.classList.add('locked','revealed');
    input.classList.remove('goodin','badin'); input.classList.add(correct ? 'goodin' : 'badin');
    state[q.id] = { type:"fill", locked:true, correct, value:user }; saveState(); updateStats();
  }

  function applyStateFill(q, card, input, hint, s) {
    card.classList.add('locked','revealed');
    input.value = s.value ?? ""; input.classList.add(s.correct ? "goodin" : "badin");
  }

  function updateStats() {
    const entries = Object.values(state).filter(v => v && v.locked);
    const answered = entries.length;
    const score = entries.filter(v => v.correct).length;
    elAnswered.textContent = answered; elScore.textContent = score; elWrong.textContent = answered - score;
    elBar.style.width = Math.round((answered / DATA.questions.length) * 100) + "%";
  }

  btnReset.addEventListener('click', () => { if(confirm("Réinitialiser toutes les réponses ?")) { state = {}; saveState(); render(); window.scrollTo({top:0, behavior:"smooth"}); } });

  btnRevealAll.addEventListener('click', () => {
    render();
    DATA.questions.forEach(q => {
      const card = document.querySelector(`.card[data-qid="${q.id}"]`);
      if(!card) return;
      card.classList.add('revealed');
      if(q.type === "single") { const rows = card.querySelectorAll('.choice'); if(rows[q.answer]) rows[q.answer].classList.add('good'); }
      if(q.type === "multi") { const rows = card.querySelectorAll('.choice'); q.answer_multi.forEach(i => rows[i] && rows[i].classList.add('good')); }
    });
  });

  elSearch.addEventListener('input', () => { query = elSearch.value.trim(); render(); });

  function flipCard(card) {
    card.classList.add('flipping');
    setTimeout(() => card.classList.toggle('flipped'), 220);
    setTimeout(() => card.classList.remove('flipping'), 450);
  }

  buildChips(); render();

  // Toggle header on mobile
  const toggleBtn = document.getElementById('toggleHeader');
  const header = document.querySelector('.header');
  toggleBtn.addEventListener('click', () => {
    header.classList.toggle('collapsed');
    toggleBtn.textContent = header.classList.contains('collapsed') ? '☰' : '✕';
  });
})();
</script>
</body>
</html>
