<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1 Partiels 2</title>
    <style>
        /* Variables pour changer les couleurs facilement 🎨 */
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-color: #00d2ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            color: var(--text-color);
            padding: 20px;
        }

        .hub-container {
            text-align: center;
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        /* La rangée de boutons flexible 🚀 */
        .button-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px; /* Espace entre les boutons */
        }

        .hub-btn {
            text-decoration: none;
            color: var(--text-color);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            min-width: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hub-btn:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--accent-color);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.5);
        }

        /* Responsive : sur mobile, on prend toute la largeur */
        @media (max-width: 600px) {
            .hub-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="hub-container">
        <h1>Révisions des partiels 2</h1>
        
        <nav class="button-row">
            <a href="quiz-systemes-reseaux.html" class="hub-btn">🔌 Quiz Réseaux</a>
            <a href="quiz-algo.html" class="hub-btn">💻 Quiz Algo</a>
            <a href="cours-algo.html" class="hub-btn">📚 Cours Algo</a>
        </nav>
    </div>

    <script>
        // Si tu veux ajouter de la logique plus tard, c'est ici ! 💡
        console.log("Hub chargé avec succès ! Prêt pour l'aventure ?");
    </script>
</body>
</html>
