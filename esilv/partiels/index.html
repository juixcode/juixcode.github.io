<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1 Partiels 2</title>
    <!-- Utilisation d'une police moderne (Outfit) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Variables pour le thème dark & glassmorphism premium 🎨 */
        :root {
            --bg-color: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* ------------------------------------------------ */
        /* Effets 3D Arrière-plan (Orbes Flous) ✨          */
        /* ------------------------------------------------ */
        .ambient-light {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.6;
            animation: float 20s infinite alternate ease-in-out;
            will-change: transform;
        }

        .light-1 {
            top: -10%; left: -10%;
            width: 50vw; height: 50vw;
            background: #4f46e5; /* Indigo */
            animation-delay: 0s;
        }

        .light-2 {
            bottom: -20%; right: -10%;
            width: 60vw; height: 60vw;
            background: #9333ea; /* Violet */
            animation-delay: -5s;
        }

        .light-3 {
            top: 40%; left: 30%;
            width: 40vw; height: 40vw;
            background: #06b6d4; /* Cyan */
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(5%, 5%) scale(1.1) rotate(5deg); }
            66% { transform: translate(-5%, 2%) scale(0.9) rotate(-5deg); }
            100% { transform: translate(2%, -5%) scale(1.05) rotate(2deg); }
        }

        /* Texture de bruit pour un aspect "matériau" ultra-moderne */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.03;
            z-index: -1;
            pointer-events: none;
        }

        /* ------------------------------------------------ */
        /* Conteneur principal                              */
        /* ------------------------------------------------ */
        .hub-container {
            text-align: center;
            max-width: 1000px;
            width: 100%;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 60px;
        }

        .section-block {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .section-title {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            letter-spacing: -1px;
            margin: 0;
        }

        .section-title.secondary {
            font-size: 2.2rem;
            background: linear-gradient(to right, #e2e8f0, #71717a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* La rangée de boutons flexible 🚀 */
        .button-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
        }

        /* ------------------------------------------------ */
        /* Boutons Glassmorphism 3D 🎛️                      */
        /* ------------------------------------------------ */
        .hub-btn {
            position: relative;
            text-decoration: none;
            color: var(--text-main);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 24px 40px;
            border-radius: 24px;
            font-size: 1.2rem;
            font-weight: 600;
            /* Transition élastique pour l'effet 3D */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 8px 32px 0 rgba(0, 0, 0, 0.3),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            min-width: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            overflow: hidden;
            transform: translateZ(0); /* Accélération matérielle */
        }

        /* Lueur interne dynamique au survol (effet de brillance) */
        .hub-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent);
            transform: skewX(-20deg);
            transition: left 0.6s ease;
        }

        .hub-btn:hover::before {
            left: 150%;
        }

        /* Effet de levitation au survol */
        .hub-btn:hover {
            transform: translateY(-8px) scale(1.03);
            background: var(--glass-hover);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 
                0 25px 40px 0 rgba(0, 0, 0, 0.4),
                0 0 30px rgba(79, 70, 229, 0.2), /* Lueur colorée sous le bouton */
                inset 0 1px 1px rgba(255, 255, 255, 0.3); /* Bord brillant interne */
        }

        .hub-btn:active {
            transform: translateY(2px) scale(0.98);
            box-shadow: 
                0 5px 15px 0 rgba(0, 0, 0, 0.3),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        /* Animation des émojis au survol */
        .icon {
            font-size: 1.6rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hub-btn:hover .icon {
            transform: scale(1.25) rotate(8deg);
        }

        /* ------------------------------------------------ */
        /* Responsive : sur mobile, on prend toute la largeur */
        /* ------------------------------------------------ */
        @media (max-width: 600px) {
            .hub-container {
                gap: 40px;
            }
            .hub-btn {
                width: 100%;
                min-width: unset;
                padding: 20px;
                font-size: 1.1rem;
            }
            .section-title {
                font-size: 2.2rem;
            }
            .section-title.secondary {
                font-size: 1.8rem;
            }
            .ambient-light {
                opacity: 0.4; /* Moins intense sur mobile pour la lisibilité */
            }
        }
    </style>
</head>
<body>

    <!-- Fond 3D et Textures -->
    <div class="noise"></div>
    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>
    <div class="ambient-light light-3"></div>

    <div class="hub-container">
        <!-- Section Partiels 2 -->
        <div class="section-block">
            <h1 class="section-title">Révisions des partiels 2</h1>
            <nav class="button-row">
                <a href="quiz-systemes-reseaux.html" class="hub-btn">
                    <span class="icon">🔌</span> Quiz Réseaux
                </a>
                <a href="quiz-algo.html" class="hub-btn">
                    <span class="icon">💻</span> Quiz Algo
                </a>
                <a href="cours-algo.html" class="hub-btn">
                    <span class="icon">📚</span> Cours Algo
                </a>
            </nav>
        </div>

        <!-- Section Anciennes révisions -->
        <div class="section-block">
            <h1 class="section-title secondary">Anciennes révisions</h1>
            <nav class="button-row">
                <a href="../linux-cc1/index.html" class="hub-btn">
                    <span class="icon">🐧</span> Quiz Systèmes CC1
                </a>
                <a href="../reseaux-cc2/index.html" class="hub-btn">
                    <span class="icon">🔌</span> Quiz Réseaux CC2
                </a>
            </nav>
        </div>
    </div>

    <script>
        // Effet de parallaxe léger au mouvement de la souris (Desktop) 🖱️
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 768) {
                const x = (e.clientX / window.innerWidth - 0.5) * 20;
                const y = (e.clientY / window.innerHeight - 0.5) * 20;
                
                const lights = document.querySelectorAll('.ambient-light');
                lights[0].style.transform = `translate(${x * 2}px, ${y * 2}px)`;
                lights[1].style.transform = `translate(${x * -1.5}px, ${y * -1.5}px)`;
                lights[2].style.transform = `translate(${x * 3}px, ${y * 1}px)`;
            }
        });

        console.log("Hub moderne 3D chargé avec succès ! 🚀");
    </script>
</body>
</html>
